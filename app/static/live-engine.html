<!DOCTYPE html>
<!--
  Preter 라이브 세션 헤드리스 오디오 엔진.

  RN 네이티브 UI(host-live-session.tsx / guest live)는 그대로 두고, 이 WebView는
  화면 없이 오디오 입출력 + 단일 WebSocket만 담당한다(WebView = headless audio worker).
  - 마이크 캡처 → 16kHz Int16 mono PCM → ws 바이너리 송신
  - ws 바이너리 수신(같은 언어 bypass, 16kHz) → 재생
  - AUDIO_TRANSLATED(base64 24kHz) → 재생
  - 그 외 JSON 이벤트는 전부 window.ReactNativeWebView.postMessage 로 RN에 중계
  RN → WebView 명령은 window.__pcmd(jsonString) 로 주입(injectJavaScript)한다.

  RN이 user_id당 소켓을 2개 열면 서버가 참가자를 덮어쓰므로, 라이브 세션의
  WebSocket은 반드시 이 엔진 하나만 소유한다.
-->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>html,body{margin:0;padding:0;background:transparent}</style>
</head>
<body>
<script>
(function () {
  var ws = null;
  var micCtx = null;       // 입력용 AudioContext (디바이스 네이티브 SR)
  var outCtx = null;       // 출력용 AudioContext
  var processor = null;
  var micStream = null;
  var nextPlayTime = 0;    // 재생 큐잉 시점(지터 방지)
  var TARGET_SR = 16000;   // Gemini Live 입력 규격

  // ---- WS 자동 재연결 ----------------------------------------------------
  // ws_error/close가 한번 발생하면(네트워크 끊김, 서버 재시작, Gemini측 끊김 전파 등)
  // 재연결을 아무도 시도하지 않아서, processor.onaudioprocess가 ws.readyState를
  // 계속 체크만 하고 조용히 오디오를 버리는 상태로 영구히 멈춰 있었다(마이크가 죽은
  // 것처럼 보이는 버그의 원인). 여기서 지수 백오프로 같은 url에 재연결을 시도한다.
  var lastUrl = null;
  var intentionalClose = false;
  var reconnectAttempts = 0;
  var reconnectTimer = null;
  var MAX_RECONNECT_DELAY_MS = 10000;

  function scheduleReconnect() {
    if (intentionalClose || !lastUrl || reconnectTimer) return;
    reconnectAttempts += 1;
    var delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), MAX_RECONNECT_DELAY_MS);
    emitStatus('ws-reconnecting', 'attempt:' + reconnectAttempts + ' delay:' + delay);
    reconnectTimer = setTimeout(function () {
      reconnectTimer = null;
      if (!intentionalClose && lastUrl) openSocket(lastUrl, true);
    }, delay);
  }

  function toRN(obj) {
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify(obj));
    }
  }

  function emitStatus(status, detail) {
    toRN({ __engine: true, status: status, detail: detail || null });
  }

  // ---- WebSocket -------------------------------------------------------
  function openSocket(url, isReconnect) {
    if (!isReconnect) {
      // 명시적 connect 명령(RN이 토큰을 새로 붙여 보낸 경우 등) — 재연결 상태 초기화.
      intentionalClose = false;
      reconnectAttempts = 0;
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    }
    lastUrl = url;
    closeSocket(true);
    try {
      ws = new WebSocket(url);
      ws.binaryType = 'arraybuffer';
    } catch (e) {
      emitStatus('error', 'socket_init:' + e.message);
      scheduleReconnect();
      return;
    }

    ws.onopen = function () {
      reconnectAttempts = 0;
      emitStatus('ws-open');
    };

    ws.onmessage = function (event) {
      if (event.data instanceof ArrayBuffer) {
        // 같은 언어 bypass 원본 PCM (16kHz)
        playPCM(event.data, 16000);
        return;
      }
      var msg;
      try { msg = JSON.parse(event.data); } catch (e) { return; }

      if (msg.type === 'AUDIO_TRANSLATED' && msg.data) {
        playPCM(base64ToArrayBuffer(msg.data), 24000); // 통역 오디오 24kHz
      } else if (msg.type === 'INTERRUPTED') {
        // 재생 큐 즉시 컷
        if (outCtx) nextPlayTime = outCtx.currentTime;
      }
      // 모든 JSON 이벤트(자막/상태/종료 등)는 RN 네이티브 UI로 중계
      toRN({ __event: true, payload: msg });
    };

    ws.onclose = function () {
      emitStatus('ws-close');
      scheduleReconnect();
    };
    ws.onerror = function () { emitStatus('error', 'ws_error'); };
  }

  function closeSocket(keepUrl) {
    if (!keepUrl) {
      intentionalClose = true;
      lastUrl = null;
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    }
    if (ws) {
      try { ws.close(); } catch (e) {}
      ws = null;
    }
  }

  // ---- 마이크 캡처 ------------------------------------------------------
  function ensureOutCtx() {
    if (!outCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      outCtx = new AC();
      nextPlayTime = outCtx.currentTime;
    }
    if (outCtx.state === 'suspended') outCtx.resume();
  }

  function startMic() {
    ensureOutCtx();
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      emitStatus('error', 'no_getusermedia');
      return;
    }
    navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    }).then(function (stream) {
      micStream = stream;
      var AC = window.AudioContext || window.webkitAudioContext;
      micCtx = new AC();
      if (micCtx.state === 'suspended') micCtx.resume();
      var source = micCtx.createMediaStreamSource(stream);
      processor = micCtx.createScriptProcessor(2048, 1, 1);
      source.connect(processor);
      processor.connect(micCtx.destination);
      var sourceSR = micCtx.sampleRate;

      processor.onaudioprocess = function (e) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        var input = e.inputBuffer.getChannelData(0);
        var resampled = resample(input, sourceSR, TARGET_SR);
        var buf = floatToInt16(resampled);
        ws.send(buf);
      };
      emitStatus('mic-started');
    }).catch(function (err) {
      emitStatus('error', 'mic:' + (err && err.message ? err.message : String(err)));
    });
  }

  function stopMic() {
    if (processor) { try { processor.disconnect(); } catch (e) {} processor = null; }
    if (micCtx) { try { micCtx.close(); } catch (e) {} micCtx = null; }
    if (micStream) {
      micStream.getTracks().forEach(function (t) { t.stop(); });
      micStream = null;
    }
    emitStatus('mic-stopped');
  }

  // ---- 오디오 변환/재생 -------------------------------------------------
  function floatToInt16(float32) {
    var out = new Int16Array(float32.length);
    for (var i = 0; i < float32.length; i++) {
      var v = Math.max(-1, Math.min(1, float32[i]));
      out[i] = v < 0 ? v * 0x8000 : v * 0x7FFF;
    }
    return out.buffer;
  }

  function resample(buffer, fromSR, toSR) {
    if (fromSR === toSR) return buffer;
    var factor = fromSR / toSR;
    var len = Math.round(buffer.length / factor);
    var result = new Float32Array(len);
    for (var i = 0; i < len; i++) {
      var raw = i * factor;
      var idx = Math.floor(raw);
      var next = Math.min(idx + 1, buffer.length - 1);
      var w = raw - idx;
      result[i] = buffer[idx] * (1 - w) + buffer[next] * w;
    }
    return result;
  }

  function base64ToArrayBuffer(b64) {
    var bin = atob(b64);
    var buf = new ArrayBuffer(bin.length);
    var view = new Uint8Array(buf);
    for (var i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
    return buf;
  }

  function playPCM(arrayBuffer, sampleRate) {
    ensureOutCtx();
    var int16 = new Int16Array(arrayBuffer);
    var float32 = new Float32Array(int16.length);
    for (var i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
    if (float32.length === 0) return;

    var audioBuffer = outCtx.createBuffer(1, float32.length, sampleRate);
    audioBuffer.copyToChannel(float32, 0);
    var src = outCtx.createBufferSource();
    src.buffer = audioBuffer;
    src.connect(outCtx.destination);

    var now = outCtx.currentTime;
    if (nextPlayTime < now) nextPlayTime = now;
    src.start(nextPlayTime);
    nextPlayTime += audioBuffer.duration;
  }

  // ---- RN → WebView 명령 진입점 ----------------------------------------
  window.__pcmd = function (jsonString) {
    var cmd;
    try { cmd = JSON.parse(jsonString); } catch (e) { return; }
    switch (cmd.type) {
      case 'connect':   openSocket(cmd.url); break;
      case 'startMic':  startMic(); break;
      case 'stopMic':   stopMic(); break;
      case 'send':      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(cmd.payload)); break;
      case 'close':     stopMic(); closeSocket(); break;
    }
  };

  emitStatus('ready');
})();
</script>
</body>
</html>
